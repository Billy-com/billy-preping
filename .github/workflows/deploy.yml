name: Deploy to Azure Functions

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: node scripts/migrate.js
        continue-on-error: true
        env:
          AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-billy-prepng
          package: .
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      # After every deploy, seed/refresh the last 7 days of LTS data.
      # This ensures Strategy charts are never empty after a deployment.
      # The LTS aggregation is idempotent (MERGE) so re-running is safe.
      - name: Seed LTS aggregation (last 7 days)
        run: |
          sleep 15  # wait for functions to warm up after deploy
          ADMIN_KEY="${{ secrets.ADMIN_API_KEY || 'Billy!Admin2026#' }}"
          # Run schema migration first (idempotent — safe to re-run)
          curl -sf -X POST "https://api.billy.com/rtb/mgmt/lts/migrate" \
            -H "x-admin-key: $ADMIN_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 60 \
            --retry 2 || echo "migrate: non-fatal, continuing"
          # Seed last 7 days of aggregations
          curl -sf -X POST "https://api.billy.com/rtb/mgmt/lts/run" \
            -H "x-admin-key: $ADMIN_KEY" \
            -H "Content-Type: application/json" \
            -d '{"days":7}' \
            --max-time 300 \
            --retry 1 || echo "lts/run: non-fatal, continuing"
        continue-on-error: true
